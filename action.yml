name: 'ai-map scan'
description: 'Refresh .ai-map/_cache/graph.json and optionally commit changes or comment on PRs with the delta.'
branding:
  icon: 'map'
  color: 'blue'

inputs:
  mode:
    description: 'commit | pr-comment | check (default: commit on push, pr-comment on PR)'
    required: false
    default: 'auto'
  commit-message:
    description: 'Commit message when mode=commit'
    required: false
    default: 'chore(ai-map): refresh graph.json'
  python-version:
    description: 'Python version (only used if project is Python-based)'
    required: false
    default: '3.11'
  node-version:
    description: 'Node version (only used if project has package.json)'
    required: false
    default: '20'

outputs:
  routes:
    description: 'Number of routes detected'
    value: ${{ steps.scan.outputs.routes }}
  todos:
    description: 'Number of TODOs detected'
    value: ${{ steps.scan.outputs.todos }}
  stubs:
    description: 'Number of unimplemented stubs detected'
    value: ${{ steps.scan.outputs.stubs }}

runs:
  using: 'composite'
  steps:
    - name: Detect stack
      id: detect
      shell: bash
      run: |
        if [ -f package.json ]; then echo "js=true" >> $GITHUB_OUTPUT; fi
        if [ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f setup.py ]; then echo "py=true" >> $GITHUB_OUTPUT; fi
        if [ ! -d .ai-map ]; then
          echo "::error::.ai-map/ not found. Run: npx ai-map init"
          exit 1
        fi

    - name: Setup Node
      if: steps.detect.outputs.js == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Python
      if: steps.detect.outputs.py == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Run scanner
      id: scan
      shell: bash
      run: |
        bash .ai-map/_parser/scan.sh
        if [ -f .ai-map/_cache/graph.json ]; then
          R=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.ai-map/_cache/graph.json','utf8')).routes.length)" 2>/dev/null || echo 0)
          T=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.ai-map/_cache/graph.json','utf8')).todos.length)" 2>/dev/null || echo 0)
          S=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.ai-map/_cache/graph.json','utf8')).stubs.length)" 2>/dev/null || echo 0)
          echo "routes=$R" >> $GITHUB_OUTPUT
          echo "todos=$T" >> $GITHUB_OUTPUT
          echo "stubs=$S" >> $GITHUB_OUTPUT
        fi

    - name: Commit refreshed map
      if: (inputs.mode == 'commit' || inputs.mode == 'auto') && github.event_name == 'push'
      shell: bash
      run: |
        git config user.name "ai-map[bot]"
        git config user.email "ai-map-bot@users.noreply.github.com"
        git add .ai-map/ 2>/dev/null || true
        if git diff --cached --quiet; then
          echo "no .ai-map/ changes to commit"
        else
          git commit -m "${{ inputs.commit-message }}"
          git push
        fi

    - name: Comment on PR
      if: (inputs.mode == 'pr-comment' || inputs.mode == 'auto') && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const body = `### .ai-map scan\n\n- Routes: **${{ steps.scan.outputs.routes }}**\n- TODOs: **${{ steps.scan.outputs.todos }}**\n- Unimplemented stubs: **${{ steps.scan.outputs.stubs }}**\n\n<sub>Generated by [ai-map](https://github.com/Shivu00rm/ai-map) GitHub Action</sub>`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body
          });
